<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — ORLED 9</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
  <body>
  <img src="images/ORLED_LOGO.jfif" alt="ORLED Logo" class="brand-logo">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><img src="images/logo.svg" alt="logo" class="logo">ORLED 9</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Contact Us</h1>
    <p>Send us a message and we'll reply promptly.</p>

    <section class="card">
      <form id="contactForm">
        <label>Name
          <input name="name" type="text" required>
        </label>
        <label>Email
          <input name="email" type="email" required>
        </label>
        <label>Message
          <textarea name="message" rows="6" required></textarea>
        </label>
        <div>
          <button class="btn primary" type="submit">Send</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h3>Other ways to reach us</h3>
      <p>Email: <a href="mailto:oripartuk@gmail.com">oripartuk@gmail.com</a><br>Phone: +972 544371191</p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
